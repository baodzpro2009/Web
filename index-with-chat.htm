<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="chat-style.css">
</head>
<body>
    <!-- Your existing profile content here -->
    <div id="profile-content">
        <!-- Example profile header -->
        <header class="profile-header">
            <h1>Welcome to My Profile 👋</h1>
            <p>Check out my AI chat assistant below!</p>
        </header>

        <!-- Your existing content -->
        <main class="profile-main">
            <section class="about">
                <h2>About Me</h2>
                <p>Add your profile content here...</p>
            </section>
        </main>
    </div>

    <!-- Chat Widget - Add to bottom right corner -->
    <div class="chat-widget-container">
        <div class="chat-container">
            <div class="chat-header">
                <div class="header-content">
                    <h1>cubi-Chan 👀</h1>
                    <p class="status">online</p>
                </div>
                <button class="minimize-btn" onclick="toggleChat()">−</button>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="message bot-message">
                    <div class="message-content">
                        <p>Chào cậu! Mình là cubi-Chan 😊 Có gì mình có thể giúp cậu không? 💕</p>
                    </div>
                    <span class="timestamp">Bây giờ</span>
                </div>
            </div>

            <div class="chat-input-area">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        class="chat-input" 
                        id="chatInput"
                        placeholder="Nhắn tin..."
                        autocomplete="off"
                    >
                    <button class="send-btn" onclick="sendMessage()">
                        <span>Gửi</span>
                    </button>
                </div>
                <div class="typing-indicator" id="typingIndicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </div>

    <style>
        /* Chat Widget Positioning */
        .chat-widget-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
        }

        @media (max-width: 600px) {
            .chat-widget-container {
                bottom: 0;
                right: 0;
                left: 0;
                width: 100%;
                height: 100%;
            }

            .chat-container {
                border-radius: 0 !important;
                height: 100vh !important;
            }
        }
    </style>

    <script src="chat.js"></script>
</body>
</html>
